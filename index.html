<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft AI - Created by WillXD</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome untuk Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Highlight.js CSS untuk Code Highlighting (Tema Atom One Dark) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-sparkles"></i> Xaerisoft AI</h2>
            </div>
            
            <button id="new-chat-btn" class="btn-primary">
                <i class="fa-solid fa-plus"></i> Chat Baru
            </button>

            <div class="history-container">
                <h3>Riwayat Chat</h3>
                <ul id="chat-history-list">
                    <!-- List riwayat chat akan dirender di sini via JS -->
                </ul>
            </div>

            <div class="sidebar-footer">
                <input type="file" id="import-file" accept=".json" hidden>
                <button id="import-btn" class="btn-secondary" title="Import Chat"><i class="fa-solid fa-file-import"></i></button>
                <button id="export-btn" class="btn-secondary" title="Export Chat"><i class="fa-solid fa-file-export"></i></button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header glass">
                <button id="mobile-menu-btn" class="mobile-only"><i class="fa-solid fa-bars"></i></button>
                <div class="header-info">
                    <h1>Xaerisoft AI</h1>
                    <span class="powered-by">Powered by WillXD</span>
                </div>
            </header>

            <div id="chat-box" class="chat-box">
                <!-- Pesan pembuka -->
                <div class="message ai glass-msg">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        <p>Yo! Xaerisoft AI di sini 🚀 Ada yang bisa gue bantu hari ini cuy?</p>
                    </div>
                </div>
            </div>

            <div class="input-area glass">
                <form id="chat-form">
                    <textarea id="user-input" placeholder="Ketik pesan lu di sini cuy..." rows="1"></textarea>
                    <button type="submit" id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
                <footer class="app-footer">
                    © 2026 Xaerisoft. All rights reserved. Created by WillXD.
                </footer>
            </div>
        </main>
        
    </div>

    <!-- Library Eksternal -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.5/purify.min.js"></script>
    
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
